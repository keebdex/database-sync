name: Keebdex Image Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *" # Runs daily at 01:00 GMT, 3 hours after the artisan sync workflow

env:
  NODE_ENV: production
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  CF_IMAGES_API_KEY: ${{ secrets.CF_IMAGES_API_KEY }}
  CF_IMAGES_ACCOUNT_ID: ${{ secrets.CF_IMAGES_ACCOUNT_ID }}
  CF_IMAGES_ACCOUNT_HASH: ${{ secrets.CF_IMAGES_ACCOUNT_HASH }}

jobs:
  image-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync images to Cloudflare
        run: bun run sync-images
